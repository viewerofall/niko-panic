PACKAGE_NAME="niko-panic"
PACKAGE_VERSION="1.0"

BUILT_MODULE_NAME[0]="niko_panic"
DEST_MODULE_LOCATION[0]="/kernel/drivers/misc"

# Build via the Makefile, which auto-detects the kernel's compiler (LLVM=1 for
# Clang-built kernels, plain GCC otherwise). KDIR points at the target kernel
# DKMS is building for, which may differ from the running one.
MAKE="make KDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean KDIR=/lib/modules/${kernelver}/build"

AUTOINSTALL="yes"
